name=NetworkProfile
version=0.2.0
author=Péter Soós
maintainer=Péter Soós
sentence=Thread-safe network interface configuration profiles for ESP32, ESP8266 and AVR.
paragraph=Provides WiFiProfile and EthProfile classes for managing network configuration (DHCP/static IP, DNS, NTP, hostname, MAC address) with thread-safe access, persistent storage via Preferences, and JSON serialisation. Supports interface priority for fallback scenarios (e.g. ETH → WiFi). Depends on the Host library.
category=Communication
url=https://github.com/soosp/NetworkProfile
architectures=esp32,esp8266,avr
includes=NetworkProfile.h,EthProfile.h,WiFiProfile.h
depends=Host,EEPROMPreferences,Preferences
license=MIT
